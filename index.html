<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Instagram Post</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <h1>Instagram Post</h1>
      </div>
    </header>

    <div class="container">
      <main>
        <section>
          <article>
            <header class="post-title">
              <div class="title-container">
                <h2>My cuttie Doggie</h2>
              </div>

              <div class="date-container">
                <p>April 24, 2026</p>
              </div>
            </header>

            <div class="image-container">
              <img src="https://picsum.photos/id/237/400/400" alt="My Doggie" />
            </div>

            <div class="comment-container">
              <p>What a cute dog!</p>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>

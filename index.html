<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="Instagram">
        <!-- Header con username y fecha -->
        <header class="instagram-header">
            <span class="username">GABITOOO24</span>
            <span class="time-posted">Hace 2 horas</span>
        </header>

        <!-- Imagen del post -->
        <figure class="instagram-image">
            <img src="https://picsum.photos/id/237/400/400" alt="Instagram Post Image" class="post-image">
        </figure>

        <!-- Footer con descripción -->
        <footer class="instagram-footer">
            <p class="description">This is me waiting for the screen to show my awesome first website made at #BreatheCode</p>
        </footer>
    </div>
</body>
</html>
